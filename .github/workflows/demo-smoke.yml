name: Demo Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync Dependencies
        run: uv sync --extra dev

      - name: Unit Tests
        run: uv run pytest tests/unit/ --no-cov -q

      - name: Demo Contract Test
        run: uv run pytest tests/integration/test_demo_contract.py --no-cov -q

      - name: Setup Smoke
        run: uv run python scripts/democtl.py setup --demo 00_repo_baseline --clean-workspace

      - name: Wipe Smoke
        run: uv run python scripts/democtl.py wipe --demo 00_repo_baseline --force
